events { worker_connections 1024; }

http {
    server {
        listen 80;
        location / {
            resolver 127.0.0.11 valid=5s;
            set $backend http://api:8000;
            proxy_pass $backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
